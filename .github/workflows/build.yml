name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Check formatting
        run: |
          nix build .#formatter.x86_64-linux -o fmt
          find . -name '*.nix' -exec ./fmt/bin/nixfmt --check {} +

      - name: Evaluate flake
        run: nix flake check --no-build --all-systems

      - name: Evaluate packages
        run: |
          nix eval .#packages.x86_64-linux.openviking.name
          nix eval .#packages.x86_64-linux.agfs.name
          nix eval .#packages.x86_64-linux.ov-cli.name
