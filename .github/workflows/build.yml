name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check formatting
        run: |
          nix build .#formatter.x86_64-linux
          find . -name '*.nix' -exec ./result/bin/nixfmt --check {} +

      - name: Evaluate flake outputs
        run: nix flake show --all-systems

      - name: Evaluate packages (no build)
        run: |
          nix eval .#packages.x86_64-linux.openviking.name
          nix eval .#packages.x86_64-linux.agfs.name
          nix eval .#packages.x86_64-linux.ov-cli.name

      - name: Check NixOS module
        run: nix eval .#nixosModules.default --apply 'x: builtins.typeOf x'

  build:
    runs-on: ubuntu-latest
    needs: check
    # Full build is expensive (Go + Rust + C++ + Python) — run on push to main only
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build agfs (Go)
        run: nix build .#agfs --print-build-logs

      - name: Build ov-cli (Rust)
        run: nix build .#ov-cli --print-build-logs

      - name: Build openviking (Python + C++)
        run: nix build .#openviking --print-build-logs

      - name: Smoke test
        run: |
          ./result/bin/ov --version
          ./result/bin/openviking-server --help > /dev/null
          echo "All binaries functional"
