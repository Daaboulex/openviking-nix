name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check formatting
        run: nix fmt -- --check .

      - name: Build openviking
        run: nix build .#openviking --print-build-logs

      - name: Build agfs
        run: nix build .#agfs --print-build-logs

      - name: Build ov-cli
        run: nix build .#ov-cli --print-build-logs

      - name: Smoke test
        run: |
          ./result/bin/ov --version
          ./result/bin/openviking-server --help
